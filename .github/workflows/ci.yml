name: OneAI CI/CD

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  REGISTRY: ghcr.io
  APPROVAL_IMAGE: ghcr.io/dreamone09/oneai/approval-svc
  PWA_IMAGE: ghcr.io/dreamone09/oneai/oneai-pwa
  VITE_APPROVAL_URL: https://oneai-approval.zeabur.app

jobs:
  # ── 1. Type-check + lint ───────────────────────────────────────────────────
  check:
    name: Type-check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install workspace dependencies
        run: npm ci --ignore-scripts

      - name: Type-check PWA
        working-directory: apps/oneai-pwa
        run: npx tsc --noEmit
        env:
          VITE_APPROVAL_BASE_URL: ${{ env.VITE_APPROVAL_URL }}
          VITE_CHAT_TOKEN: ci-placeholder

      - name: Syntax check approval-svc
        working-directory: services/approval
        run: node --check src/server.js

  # ── 2. Build & push Docker images to GHCR ─────────────────────────────────
  build-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: check
    permissions:
      contents: read
      packages: write
    outputs:
      approval_tag: ${{ steps.meta-approval.outputs.tags }}
      pwa_tag: ${{ steps.meta-pwa.outputs.tags }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ---- approval-svc ----
      - name: Docker metadata (approval-svc)
        id: meta-approval
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.APPROVAL_IMAGE }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push approval-svc
        uses: docker/build-push-action@v5
        with:
          context: services/approval
          file: services/approval/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta-approval.outputs.tags }}
          labels: ${{ steps.meta-approval.outputs.labels }}

      # ---- oneai-pwa ----
      - name: Docker metadata (oneai-pwa)
        id: meta-pwa
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.PWA_IMAGE }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push oneai-pwa
        uses: docker/build-push-action@v5
        with:
          context: apps/oneai-pwa
          file: apps/oneai-pwa/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta-pwa.outputs.tags }}
          labels: ${{ steps.meta-pwa.outputs.labels }}
          build-args: |
            VITE_APPROVAL_BASE_URL=${{ env.VITE_APPROVAL_URL }}
            VITE_CHAT_TOKEN=${{ secrets.VITE_CHAT_TOKEN }}
            VITE_APPROVAL_TOKEN=${{ secrets.VITE_APPROVAL_TOKEN }}
            VITE_VAPID_PUBLIC_KEY=${{ secrets.VITE_VAPID_PUBLIC_KEY }}

      # Make GHCR packages public so Zeabur can pull without credentials
      - name: Make GHCR packages public
        if: github.event_name == 'push'
        run: |
          for pkg in "oneai%2Fapproval-svc" "oneai%2Foneai-pwa"; do
            curl -s -X PATCH \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/user/packages/container/${pkg}" \
              -d '{"visibility":"public"}' | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('visibility') or d.get('message','?'))"
          done

  # ── 3. Deploy (disabled - Zeabur git trigger handles deployment via ZBPACK_APP_DIR) ──
  # deploy step intentionally removed to avoid GHCR private image conflicts
  # Zeabur automatically rebuilds when GitHub push triggers the git-linked service
