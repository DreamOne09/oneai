name: OneAI CI/CD

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  # ── 1. Build oneai-pwa ──────────────────────────────────────────────────────
  build-pwa:
    name: Build PWA
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install all workspace dependencies
        run: npm ci --ignore-scripts

      - name: Type-check
        working-directory: apps/oneai-pwa
        run: npx tsc --noEmit

      - name: Build
        working-directory: apps/oneai-pwa
        run: npm run build
        env:
          VITE_APPROVAL_BASE_URL: https://oneai-approval.zeabur.app
          VITE_CHAT_TOKEN: ci-placeholder

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: pwa-dist
          path: apps/oneai-pwa/dist
          retention-days: 7

  # ── 2. Lint approval-svc ───────────────────────────────────────────────────
  lint-approval:
    name: Lint approval-svc
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install all workspace dependencies
        run: npm ci --ignore-scripts

      - name: Syntax check
        working-directory: services/approval
        run: node --check src/server.js

  # ── 3. Docker build check ──────────────────────────────────────────────────
  docker-check:
    name: Docker Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build approval-svc image
        run: docker build -f services/approval/Dockerfile services/approval/ -t oneai-approval:ci

      - name: Build oneai-pwa image
        run: docker build -f apps/oneai-pwa/Dockerfile apps/oneai-pwa/ -t oneai-pwa:ci
        env:
          VITE_APPROVAL_BASE_URL: https://oneai-approval.zeabur.app

  # ── 4. Deploy to Zeabur (only on push to master) ─────────────────────────
  deploy:
    name: Deploy to Zeabur
    runs-on: ubuntu-latest
    needs: [build-pwa, lint-approval, docker-check]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Login to Zeabur CLI
        run: npx zeabur@latest auth login --token "${{ secrets.ZEABUR_TOKEN }}"

      - name: Set Zeabur project context
        run: npx zeabur@latest context set project --id "${{ secrets.ZEABUR_PROJECT_ID }}"

      - name: Deploy approval-svc to Zeabur
        working-directory: services/approval
        run: |
          npx zeabur@latest context set service --id "${{ secrets.APPROVAL_SERVICE_ID }}"
          npx zeabur@latest upload -i=false

      - name: Deploy oneai-pwa to Zeabur
        working-directory: apps/oneai-pwa
        run: |
          npx zeabur@latest context set service --id "${{ secrets.PWA_SERVICE_ID }}"
          npx zeabur@latest upload -i=false
